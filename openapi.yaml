openapi: 3.0.3
info:
  title: Seraja Backend API
  version: 1.0.0
  description: |
    REST API for authentication, campgrounds, and bookings.

    Notes:
    - Most protected endpoints require `Authorization: Bearer <jwt>`.
    - Swagger UI is served at `/api-docs`.
servers:
  - url: https://seraja-backend-production-d4a4.up.railway.app
    description: Production (Railway)
  - url: http://localhost:5000
    description: Local development

tags:
  - name: Auth
  - name: Campgrounds
  - name: Bookings
  - name: Reviews

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CampgroundIdParam:
      name: campgroundId
      in: path
      required: true
      schema:
        type: string
      description: MongoDB ObjectId of campground.
    BookingIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: MongoDB ObjectId of booking.
    CampgroundEntityIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: MongoDB ObjectId of campground.

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: 67cae6fd2e3d0f4b15d7e521
        name:
          type: string
          example: John Smith
        tel:
          type: string
          example: "0898765432"
        email:
          type: string
          format: email
          example: john.smith@example.com
        role:
          type: string
          enum: [user, admin, campOwner]
          example: user
        createdAt:
          type: string
          format: date-time

    Campground:
      type: object
      properties:
        _id:
          type: string
          example: 67cae8f12e3d0f4b15d7e70f
        name:
          type: string
          maxLength: 50
          example: Pine Mountain Camp
        address:
          type: string
          example: 123 Mountain Road
        district:
          type: string
          example: Chiang Mai
        province:
          type: string
          example: Chiang Mai
        postalcode:
          type: string
          maxLength: 5
          example: "50000"
        tel:
          type: string
          example: "0811111111"
        region:
          type: string
          example: North
        capacity:
          type: integer
          minimum: 1
          example: 50
        owner:
          type: string
          example: 67cae6fd2e3d0f4b15d7e5f0
        bookings:
          type: array
          items:
            oneOf:
              - type: string
              - $ref: "#/components/schemas/Booking"

    Booking:
      type: object
      properties:
        _id:
          type: string
          example: 67caf1232e3d0f4b15d80271
        checkInDate:
          type: string
          format: date-time
        checkOutDate:
          type: string
          format: date-time
        actualCheckIn:
          type: string
          format: date-time
          nullable: true
        actualCheckOut:
          type: string
          format: date-time
          nullable: true
        nightsCount:
          type: integer
          minimum: 1
          maximum: 3
          example: 2
        user:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/User"
          nullable: true
        guestName:
          type: string
          nullable: true
          example: Tom Hardy
        guestTel:
          type: string
          nullable: true
          example: "0612345678"
        campground:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/Campground"
        status:
          type: string
          enum:
            - confirmed
            - checked-in
            - checked-out
            - cancelled
            - reviewed
            - can-not-review
          default: confirmed
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        review_rating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
          example: 5
        review_comment:
          type: string
          nullable: true
          example: Great campground, would visit again.
        review_createdAt:
          type: string
          format: date-time
          nullable: true
        review_isDeleted:
          type: boolean
          default: false

    RegisterRequest:
      type: object
      required: [name, tel, email, password]
      properties:
        name:
          type: string
        tel:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [user, admin, campOwner]
          default: user

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    CampgroundUpsertRequest:
      type: object
      required:
        [name, address, district, province, postalcode, tel, region, owner]
      properties:
        name:
          type: string
          maxLength: 50
        address:
          type: string
        district:
          type: string
        province:
          type: string
        postalcode:
          type: string
          maxLength: 5
        tel:
          type: string
        region:
          type: string
        capacity:
          type: integer
          minimum: 1
          default: 5
        owner:
          type: string
          description: User id with role campOwner.

    BookingCreateRequest:
      type: object
      required: [checkInDate, checkOutDate]
      description: |
        For regular self-booking, do not send `guestName` and `guestTel`.
        For guest booking, send both `guestName` and `guestTel` (allowed only for admin or campground owner).
      properties:
        checkInDate:
          type: string
          format: date
          example: "2026-05-01"
        checkOutDate:
          type: string
          format: date
          example: "2026-05-03"
        guestName:
          type: string
          nullable: true
        guestTel:
          type: string
          nullable: true

    BookingUpdateRequest:
      type: object
      properties:
        checkInDate:
          type: string
          format: date
        checkOutDate:
          type: string
          format: date
        guestName:
          type: string
          nullable: true
        guestTel:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - confirmed
            - checked-in
            - checked-out
            - cancelled
            - reviewed
            - can-not-review

    ReviewUpsertRequest:
      type: object
      required: [review_rating]
      properties:
        review_rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        review_comment:
          type: string
          nullable: true
          example: Loved the lakeside view.

    ReviewListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          example: 3
        averageRating:
          type: number
          format: float
          example: 4.67
        data:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    TokenResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        token:
          type: string

    EmptyDataResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: false

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Not authorized to access this route
        error:
          type: string
          example: Registration failed

    UserDataResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/User"

    CampgroundListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          example: 10
        data:
          type: array
          items:
            $ref: "#/components/schemas/Campground"

    CampgroundDataResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Campground"

    BookingListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          example: 2
        data:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    TodayCheckoutResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          example: 2
        date:
          type: string
          example: "2026-04-14"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    BookingDataResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Booking"

paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered and JWT issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Registration failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success and JWT issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing email or password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current logged-in user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDataResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/logout:
    get:
      tags: [Auth]
      summary: Logout and clear auth cookie
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyDataResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/campgrounds:
    get:
      tags: [Campgrounds]
      summary: List campgrounds
      description: Supports simple filtering and Mongo operators (`gt`, `gte`, `lt`, `lte`, `in`) via query string.
      parameters:
        - name: select
          in: query
          schema:
            type: string
          description: Comma-separated fields.
        - name: sort
          in: query
          schema:
            type: string
          description: Comma-separated sort fields.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Campground list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampgroundListResponse"
        "500":
          description: Server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Campgrounds]
      summary: Create campground
      description: Admin role only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampgroundUpsertRequest"
      responses:
        "201":
          description: Campground created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampgroundDataResponse"
        "401":
          description: Not admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Role forbidden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/campgrounds/{id}:
    get:
      tags: [Campgrounds]
      summary: Get campground by id
      parameters:
        - $ref: "#/components/parameters/CampgroundEntityIdParam"
      responses:
        "200":
          description: Campground details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampgroundDataResponse"
        "400":
          description: Invalid or missing campground.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags: [Campgrounds]
      summary: Update campground
      description: Admin or owner of campground.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampgroundEntityIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampgroundUpsertRequest"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampgroundDataResponse"
        "400":
          description: Invalid request or missing campground.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not owner/admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Campgrounds]
      summary: Delete campground
      description: Admin role only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampgroundEntityIdParam"
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyDataResponse"
        "400":
          description: Invalid or missing campground.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/campgrounds/{id}/reviews:
    get:
      tags: [Reviews]
      summary: List reviews for a campground
      description: |
        Returns active reviews (status `reviewed` and `review_isDeleted` not true) for the given campground,
        plus the computed `averageRating`. Supports `sort` and Mongo operator filters
        (e.g. `?review_rating[gte]=4`). Default sort is `-review_createdAt` (newest first).
      parameters:
        - $ref: "#/components/parameters/CampgroundEntityIdParam"
        - name: sort
          in: query
          schema:
            type: string
          description: Comma-separated sort fields (e.g. `-review_createdAt`).
        - name: review_rating
          in: query
          schema:
            type: object
          description: Operator filter, e.g. `?review_rating[gte]=4`.
      responses:
        "200":
          description: Review list with average rating.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
        "500":
          description: Server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/campgrounds/{campgroundId}/bookings:
    get:
      tags: [Bookings]
      summary: List bookings (scoped by role)
      description: |
        Requires authentication.
        - admin: sees all bookings
        - campOwner: sees bookings for owned campgrounds
        - user: sees own bookings
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampgroundIdParam"
        - name: select
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [confirmed, checked-in, checked-out, cancelled]
      responses:
        "200":
          description: Booking list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingListResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Bookings]
      summary: Create booking for campground
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampgroundIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCreateRequest"
      responses:
        "201":
          description: Booking created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDataResponse"
        "400":
          description: Validation or capacity error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden for guest-booking role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Campground not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings:
    get:
      tags: [Bookings]
      summary: List bookings (scoped by role)
      security:
        - bearerAuth: []
      parameters:
        - name: select
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [confirmed, checked-in, checked-out, cancelled]
      responses:
        "200":
          description: Booking list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingListResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Bookings]
      summary: Create booking (legacy route)
      description: |
        This route exists in code but creation logic expects `campgroundId` in path params.
        Prefer `POST /api/v1/campgrounds/{campgroundId}/bookings`.
      deprecated: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCreateRequest"
      responses:
        "404":
          description: Usually fails because campgroundId is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/export:
    get:
      tags: [Bookings]
      summary: Export bookings as CSV
      description: campOwner and admin only.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: CSV file attachment.
          content:
            text/csv:
              schema:
                type: string
        "403":
          description: Not allowed for role user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/today-checkouts:
    get:
      tags: [Bookings]
      summary: Get today's expected check-outs
      description: campOwner and admin only.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Today checkout list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayCheckoutResponse"
        "403":
          description: Not authorized for role user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingIdParam"
      responses:
        "200":
          description: Booking details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDataResponse"
        "401":
          description: Not authorized to view booking.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags: [Bookings]
      summary: Update booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdateRequest"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDataResponse"
        "400":
          description: Validation or invalid status transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Bookings]
      summary: Delete booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingIdParam"
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyDataResponse"
        "400":
          description: Cannot delete due to status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}/cancel:
    put:
      tags: [Bookings]
      summary: Cancel booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingIdParam"
      responses:
        "200":
          description: Cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDataResponse"
        "400":
          description: Already cancelled or started/completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized to cancel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}/checkin:
    put:
      tags: [Bookings]
      summary: Check in booking
      description: campOwner of the campground only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingIdParam"
      responses:
        "200":
          description: Checked in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDataResponse"
        "400":
          description: Invalid timing/state or campground full.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}/checkout:
    put:
      tags: [Bookings]
      summary: Check out booking
      description: campOwner of the campground only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingIdParam"
      responses:
        "200":
          description: Checked out.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDataResponse"
        "400":
          description: Cannot checkout before check-in or already checked out.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}/review:
    put:
      tags: [Reviews]
      summary: Create a review for a booking
      description: |
        User role only. Booking must be owned by the caller and have status `checked-out`.
        After success the booking status becomes `reviewed`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpsertRequest"
      responses:
        "200":
          description: Review created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDataResponse"
        "400":
          description: Not yet checked-out, already reviewed, or invalid rating.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the booking owner, not a `user`, or booking is blocked from reviewing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Reviews]
      summary: Delete a booking review (soft delete)
      description: |
        Soft-delete a review. Behavior depends on the caller:
        - **user (booking owner)**: clears the review and resets status to `checked-out` so the user can re-review.
        - **admin**: marks the booking `can-not-review`, permanently blocking further reviews.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingIdParam"
      responses:
        "200":
          description: Review deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDataResponse"
        "400":
          description: No active review on this booking.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the booking owner and not an admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}/review/update:
    put:
      tags: [Reviews]
      summary: Update an existing booking review
      description: |
        User role only. Booking must be owned by the caller and currently have status `reviewed`
        with `review_isDeleted` not true.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BookingIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpsertRequest"
      responses:
        "200":
          description: Review updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDataResponse"
        "400":
          description: No active review to update or invalid rating.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the booking owner or not a `user`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
